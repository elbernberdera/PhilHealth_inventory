{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PhilHealth Inventory System</title>
    <link rel="icon" type="image/png" href="{% static 'image/logo.png' %}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'fontawesome-free/css/all.min.css' %}">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="{% static 'sweetalert2/sweetalert2.min.css' %}">
    <style>
        body {
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: auto;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Full page background with gradient overlay */
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-image: url('{% static "image/bg_ph.avif" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        /* Gradient overlay - yellow to green (behind login form) */
        .page-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(59, 255, 255, 0.55) 0%, rgba(66, 228, 160, 0.55) 100%);
            z-index: 1;
        }

        /* Main centered container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            height: 650px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* Teal/green left section - image with green overlay */
        .green-section {
            width: 50%;
            height: 100%;
            background-image: linear-gradient(135deg, rgba(24, 160, 135, 0.88) 0%, rgba(26, 140, 110, 0.82) 40%, rgba(126, 184, 138, 0.78) 100%), url('{% static "image/31099699_9.jpg" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 50px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Subtle wave/abstract pattern overlay */
        .green-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255,255,255,0.12) 0%, transparent 70%),
                        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(255,255,255,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .green-section .logo-container {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: -130px;
        }

        .green-section .logo {
            width: 410px;
            height: auto;
            display: block;
        }

        .green-section .brand-name {
            color: #0d3d33;
            font-size: 1.75em;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: -0.02em;
        }

        .green-section .slogan {
            color: #1a1a1a;
            font-size: 1em;
            font-weight: 500;
            margin: 6px 0 0 0;
        }

        /* White right section - image with light overlay for form readability */
        .white-section {
            width: 50%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.88)), url('{% static "image/31099699_9.jpg" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 40px;
            box-sizing: border-box;
            position: relative;
        }

        .login-form-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .login-form-container .form-header {
            text-align: left;
            margin-bottom: 32px;
        }

        .login-form-container .form-header h2 {
            color: #333;
            font-weight: 700;
            font-size: 3.5em;
            margin-bottom: 8px;
            margin-top: 0;
        }

        .login-form-container .form-header p {
            color: #666;
            font-size: 1.2em;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group input {
            padding: 14px 44px 14px 44px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            width: 100%;
            font-size: 1em;
            background-color: #fff;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .form-group input:hover {
            border-color: #b0b0b0;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2d8659;
            box-shadow: 0 0 0 3px rgba(45, 134, 89, 0.12);
        }

        .form-group .form-control-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            pointer-events: none;
            font-size: 1em;
        }

        .form-group .form-control-icon.password-toggle-icon {
            left: auto;
            right: 16px;
            pointer-events: auto;
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
        }

        .form-group .form-control-icon.password-toggle-icon:hover {
            color: #2d8659;
        }

        .btn-primary {
            background: #1e5d3f;
            border: none;
            padding: 14px;
            font-size: 1.05em;
            border-radius: 10px;
            margin-top: 8px;
            width: 100%;
            color: white;
            font-weight: 600;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #2d8659;
            box-shadow: 0 4px 14px rgba(45, 134, 89, 0.35);
        }

        .form-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .form-links a {
            color: #2d8659;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .form-links a:hover {
            color: #1e5d3f;
            text-decoration: underline;
        }

        @media (max-width: 968px) {
            .login-container {
                flex-direction: column;
                height: auto;
                max-width: 500px;
            }
            
            .green-section {
                width: 100%;
                min-height: 260px;
                padding: 40px 30px;
            }
            
            .green-section .logo {
                width: 320px;
            }
            
            .green-section .brand-name {
                font-size: 1.5em;
            }
            
            .white-section {
                width: 100%;
                padding: 40px 30px;
            }
            
            .login-form-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Full Page Background with Low Opacity -->
    <div class="page-background"></div>
    
    <!-- Main Centered Container -->
    <div class="login-container">
        <!-- Teal/Green Left Section -->
        <div class="green-section">
            <div class="logo-container">
                <img src="{% static 'image/logo1.png' %}" alt="PhilHealth Logo" class="logo">
            </div>
        </div>
        
        <!-- White/Translucent Right Section -->
        <div class="white-section">
            <div class="login-form-container">
                <div class="form-header">
                    <h2>Login</h2>
                    <p>Please login to your account</p>
                </div>
                
                {% if messages %}
                    {% for message in messages %}
                        {% if message.tags == 'error' %}
                            <div id="error-message" style="display: none;">{{ message }}</div>
                        {% endif %}
                    {% endfor %}
                {% endif %}
                
                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <span class="form-control-icon"><i class="fas fa-user"></i></span>
                        <input type="text" id="username" name="username" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <span class="form-control-icon"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <span class="form-control-icon password-toggle-icon" id="password-toggle"><i class="fas fa-eye-slash"></i></span>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                    <div class="form-links">
                        <a href="#">Forgot password?</a>
                        <a href="#">Create account</a>
                    </div>
                </form>
                
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 JS -->
    <script src="{% static 'sweetalert2/sweetalert2.min.js' %}"></script>
    
    <!-- Custom JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if there's an error message and show SweetAlert
            const errorMessage = document.getElementById('error-message');
            if (errorMessage) {
                const errorText = errorMessage.textContent.trim();
                if (errorText) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Login Failed',
                        text: errorText,
                        confirmButtonText: 'OK',
                        confirmButtonColor: '#4A90E2',
                        allowOutsideClick: false,
                        allowEscapeKey: false
                    });
                }
            }

            // Password visibility toggle
            const passwordToggle = document.getElementById('password-toggle');
            const passwordInput = document.getElementById('password');
            const passwordIcon = passwordToggle.querySelector('i');

            passwordToggle.addEventListener('click', function() {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    passwordIcon.classList.remove('fa-eye-slash');
                    passwordIcon.classList.add('fa-eye');
                } else {
                    passwordInput.type = 'password';
                    passwordIcon.classList.remove('fa-eye');
                    passwordIcon.classList.add('fa-eye-slash');
                }
            });
        });
    </script>
</body>
</html>
