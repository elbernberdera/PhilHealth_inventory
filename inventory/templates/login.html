{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PhilHealth Inventory System</title>
    <link rel="icon" type="image/png" href="{% static 'image/logo.png' %}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'fontawesome-free/css/all.min.css' %}">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="{% static 'sweetalert2/sweetalert2.min.css' %}">
    <style>
        body {
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        .background-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 70%;
            height: 100vh;
            background-image: url('{% static "image/bg1.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .white-section {
            position: fixed;
            top: 0;
            right: 0;
            width: 50%;
            height: 100vh;
            background: white;
            z-index: 1;
        }

        .logo-top-right {
            display: block;
            width: 350px;
            height: auto;
            position: absolute;
            top: 30px;
            left: 15%;
            z-index: 3;
            margin-bottom: 40px;
        }

        .login-form-container {
            position: absolute;
            top: 55%;
            left: 15%;
            transform: translateY(-50%);
            width: 380px;
            z-index: 10;
            padding-top: 100px;
        }

        .login-form-container h3 {
            margin-bottom: 40px;
            color: #333;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .form-group input {
            padding: 12px 45px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 100%;
            font-size: 1em;
            background-color: #fff;
            position: relative;
            z-index: 10;
            pointer-events: auto !important;
            cursor: text;
            box-sizing: border-box;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        .form-group input:hover {
            border-color: #007bff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .form-group .form-control-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            pointer-events: none;
            z-index: 11;
        }

        .form-group .password-toggle-icon {
            pointer-events: auto;
            cursor: pointer;
            transition: color 0.2s;
        }

        .form-group .password-toggle-icon:hover {
            color: #007bff;
        }

        .btn-primary {
            background: linear-gradient(to right, #4A90E2, #357ABD);
            border: none;
            padding: 12px;
            font-size: 1.1em;
            border-radius: 8px;
            margin-top: 10px;
            width: 100%;
            color: white;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .social-login {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1.2em;
        }

        .social-btn.google i {
            background: linear-gradient(45deg, #4285F4, #34A853, #FBBC05, #EA4335);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .social-btn.facebook {
            color: #1877F2;
        }

        @media (max-width: 768px) {
            .background-section {
                width: 100%;
            }
            .white-section {
                width: 100%;
            }
            .login-form-container {
                left: 50%;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>
    <!-- Background Section (Left Side) -->
    <div class="background-section"></div>
    
    <!-- White Section (Right Side) -->
    <div class="white-section">
        <!-- Logo at the top -->
        <img src="{% static 'image/logo1.png' %}" alt="Logo" class="logo-top-right">
        
        <!-- Login Form Container -->
        <div class="login-form-container">
            {% if messages %}
                {% for message in messages %}
                    {% if message.tags == 'error' %}
                        <div id="error-message" style="display: none;">{{ message }}</div>
                    {% endif %}
                {% endfor %}
            {% endif %}
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <input type="text" id="username" name="username" placeholder="Username" required>
                    <span class="form-control-icon"><i class="fas fa-user"></i></span>
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <span class="form-control-icon password-toggle-icon" id="password-toggle"><i class="fas fa-eye-slash"></i></span>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            
            <!-- Social Login Buttons -->
            <div class="social-login">
                <button type="button" class="social-btn google" title="Login with Google">
                    <i class="fab fa-google"></i>
                </button>
                <button type="button" class="social-btn facebook" title="Login with Facebook">
                    <i class="fab fa-facebook-f"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 JS -->
    <script src="{% static 'sweetalert2/sweetalert2.min.js' %}"></script>
    
    <!-- Custom JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if there's an error message and show SweetAlert
            const errorMessage = document.getElementById('error-message');
            if (errorMessage) {
                const errorText = errorMessage.textContent.trim();
                if (errorText) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Login Failed',
                        text: errorText,
                        confirmButtonText: 'OK',
                        confirmButtonColor: '#4A90E2',
                        allowOutsideClick: false,
                        allowEscapeKey: false
                    });
                }
            }

            // Password visibility toggle
            const passwordToggle = document.getElementById('password-toggle');
            const passwordInput = document.getElementById('password');
            const passwordIcon = passwordToggle.querySelector('i');

            passwordToggle.addEventListener('click', function() {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    passwordIcon.classList.remove('fa-eye-slash');
                    passwordIcon.classList.add('fa-eye');
                } else {
                    passwordInput.type = 'password';
                    passwordIcon.classList.remove('fa-eye');
                    passwordIcon.classList.add('fa-eye-slash');
                }
            });
        });
    </script>
</body>
</html>
